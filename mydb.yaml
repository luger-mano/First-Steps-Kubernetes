apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydb
  labels: 
    app: mydblabel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mydblabel
  template:
    metadata:
      labels:
        app: mydblabel
    spec:
      containers:
        - name: mydb
          image: postgres
          
